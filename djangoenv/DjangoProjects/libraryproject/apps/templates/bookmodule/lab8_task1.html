{% extends "layouts/base.html" %}
{% block content %}
<h2>Task 1: Books with Price <= 80</h2>
<table border="1">
    <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Price</th>
    </tr>
    {% for book in books %}
    <tr>
        <td>{{ book.title }}</td>
        <td>{{ book.author }}</td>
        <td>{{ book.price }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="3">No books found matching this criteria.</td></tr>
    {% endfor %}
</table>
{% endblock %}
