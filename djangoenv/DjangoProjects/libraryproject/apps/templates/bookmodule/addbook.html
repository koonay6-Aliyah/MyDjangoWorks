<h2>إضافة كتاب جديد</h2>
<form method="POST">
    {% csrf_token %}
    <label>العنوان:</label><br>
    <input type="text" name="title" required><br><br>

    <label>المؤلف:</label><br>
    <input type="text" name="author" required><br><br>

    <label>السعر:</label><br>
    <input type="number" step="0.01" name="price" required><br><br>

    <label>الطبعة:</label><br>
    <input type="number" name="edition" required><br><br>

    <button type="submit">حفظ الكتاب</button>
</form>
<br>
<a href="/books/lab9_part1/listbooks">العودة للقائمة</a>
