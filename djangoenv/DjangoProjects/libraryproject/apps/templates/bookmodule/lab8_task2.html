{% extends "layouts/base.html" %}
{% block content %}
<h2>Task 2: Editions > 3 and Title/Author contains 'qu'</h2>
<table border="1">
    <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Edition</th>
    </tr>
    {% for book in books %}
    <tr>
        <td>{{ book.title }}</td>
        <td>{{ book.author }}</td>
        <td>{{ book.edition }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="3">No books matching this complex criteria.</td></tr>
    {% endfor %}
</table>
{% endblock %}
